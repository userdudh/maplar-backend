services:
  app:
    image: node:lts
    container_name: node_app
    working_dir: /usr/app
    volumes:
      - .:/usr/app
      - /usr/app/node_modules
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: "postgresql://admin:admin123@db:5432/maplar?schema=public"
    command: sh -c "npm install && npm run dev"
    depends_on:
      - db
    networks:
      - app_net

  db:
    image: postgres:17
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: maplar
    ports:
      - "5433:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - app_net

volumes:
  db_data:

networks:
  app_net:
    driver: bridge