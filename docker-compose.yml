services:
  app:
    image: node:24
    container_name: node_app
    working_dir: /usr/app
    volumes:
      - .:/usr/app
      - /usr/app/node_modules
    ports:
      - "8080:8080"
    command: sh -c "npm install && npm run dev"
    networks:
      - app_net

networks:
  app_net:
    driver: bridge